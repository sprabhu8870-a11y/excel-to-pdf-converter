<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetConvert - Excel to PDF Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-emerald-600 text-white p-2 rounded-lg shadow-sm">
                    <i class="fa-solid fa-file-excel text-xl"></i>
                </div>
                <div>
                    <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-emerald-600 to-teal-600 bg-clip-text text-transparent">SheetConvert</span>
                    <span class="text-xs block text-slate-400 font-medium">Excel to PDF Engine</span>
                </div>
            </div>
            <div class="flex items-center space-x-4 text-sm text-slate-500">
                <span><i class="fa-solid fa-shield-halved text-emerald-500 mr-1"></i> Backend Server-Driven Processing</span>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <section class="lg:col-span-5 flex flex-col space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h2 class="text-base font-semibold text-slate-900 mb-4 flex items-center">
                    <span class="w-1.5 h-4 bg-emerald-500 rounded-full mr-2"></span>1. Upload Spreadsheet
                </h2>
                <div id="dropzone" class="border-2 border-dashed border-slate-300 hover:border-emerald-500 bg-slate-50/50 hover:bg-emerald-50/20 rounded-xl p-8 text-center cursor-pointer transition-all group">
                    <input type="file" id="excel-file" accept=".xlsx, .xls, .csv" class="hidden">
                    <label for="excel-file" class="cursor-pointer block">
                        <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-400 group-hover:text-emerald-500 transition-colors mb-3"></i>
                        <p class="text-sm font-medium text-slate-700">Drag & drop your Excel file here</p>
                        <p class="text-xs text-slate-400 mt-1">Supports .xlsx, .xls, .csv</p>
                        <span class="mt-4 inline-flex items-center px-3 py-1.5 border border-slate-300 shadow-sm text-xs font-medium rounded-md text-slate-700 bg-white hover:bg-slate-50 transition-colors">Browse Files</span>
                    </label>
                </div>

                <div id="file-info" class="mt-4 p-3 bg-emerald-50 rounded-lg border border-emerald-200 flex items-center justify-between hidden">
                    <div class="flex items-center space-x-3 overflow-hidden">
                        <i class="fa-solid fa-file-invoice text-emerald-600 text-lg flex-shrink-0"></i>
                        <div class="truncate">
                            <p id="filename-display" class="text-sm font-medium text-emerald-900 truncate"></p>
                            <p id="filesize-display" class="text-xs text-emerald-600"></p>
                        </div>
                    </div>
                    <button id="remove-file-btn" class="text-slate-400 hover:text-rose-500 p-1 transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <p id="file-error" class="mt-3 text-xs text-rose-600 hidden"></p>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h2 class="text-base font-semibold text-slate-900 mb-4 flex items-center">
                    <span class="w-1.5 h-4 bg-emerald-500 rounded-full mr-2"></span>2. Page Configuration
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Page Orientation</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="border border-slate-200 rounded-lg p-3 flex items-center justify-center space-x-2 cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors text-sm font-medium">
                                <input type="radio" name="orientation" value="p" class="text-emerald-600 focus:ring-emerald-500">
                                <span><i class="fa-solid fa-file mr-1"></i> Portrait</span>
                            </label>
                            <label class="border border-emerald-500 bg-emerald-50/30 rounded-lg p-3 flex items-center justify-center space-x-2 cursor-pointer transition-colors text-sm font-medium text-emerald-900">
                                <input type="radio" name="orientation" value="l" class="text-emerald-600 focus:ring-emerald-500" checked>
                                <span><i class="fa-solid fa-file-invoice mr-1-landscape rotate-90 inline-block"></i> Landscape</span>
                            </label>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Paper Size</label>
                            <select id="paper-size" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                                <option value="a4" selected>A4</option>
                                <option value="letter">Letter</option>
                                <option value="legal">Legal</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Sheet Scaling</label>
                            <select id="scaling" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                                <option value="fit-columns" selected>Fit Columns</option>
                                <option value="actual-size">Actual Size</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-2 border-t border-slate-100 space-y-3">
                        <label class="flex items-center space-x-3 text-sm font-medium text-slate-700 cursor-pointer">
                            <input type="checkbox" id="gridlines" class="rounded text-emerald-600 focus:ring-emerald-500 w-4 h-4" checked>
                            <span>Include spreadsheet gridlines</span>
                        </label>
                        <label class="flex items-center space-x-3 text-sm font-medium text-slate-700 cursor-pointer">
                            <input type="checkbox" id="all-sheets" class="rounded text-emerald-600 focus:ring-emerald-500 w-4 h-4">
                            <span>Convert entire workbook (all tabs)</span>
                        </label>
                    </div>
                </div>
            </div>

            <button id="convert-btn" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-medium py-3 px-4 rounded-xl shadow-md flex items-center justify-center space-x-2 opacity-50 cursor-not-allowed" disabled>
                <span>Convert to PDF</span>
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </section>

        <section class="lg:col-span-7 flex flex-col">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex-1 flex flex-col">
                <h2 class="text-base font-semibold text-slate-900 mb-4 flex items-center">
                    <span class="w-1.5 h-4 bg-teal-500 rounded-full mr-2"></span>Document Output Preview
                </h2>

                <div id="state-empty" class="flex-1 border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center p-8 bg-slate-50/30">
                    <i class="fa-solid fa-file-pdf text-4xl text-slate-300 mb-3"></i>
                    <p class="text-sm font-medium text-slate-600">No generated PDF available</p>
                </div>

                <div id="state-loading" class="flex-1 border border-slate-200 rounded-xl flex flex-col items-center justify-center p-8 bg-white hidden">
                    <div class="w-12 h-12 rounded-full border-4 border-slate-100 border-t-emerald-600 animate-spin mb-4"></div>
                    <p class="text-sm font-medium text-slate-700">Processing on backend pipeline server...</p>
                </div>

                <div id="state-ready" class="flex-1 flex flex-col space-y-4 hidden">
                    <div class="bg-slate-50 rounded-xl p-4 flex items-center justify-between border border-slate-100">
                        <div class="truncate">
                            <h4 id="output-filename" class="text-sm font-semibold text-slate-800 truncate"></h4>
                            <p id="output-meta" class="text-xs text-slate-400"></p>
                        </div>
                        <button id="download-btn" class="inline-flex items-center px-4 py-2 bg-emerald-600 text-white text-sm font-medium rounded-lg shadow-sm">
                            <i class="fa-solid fa-download mr-2"></i>Download PDF
                        </button>
                    </div>
                    <div class="flex-1 border border-slate-200 rounded-xl bg-slate-400 min-h-[450px]">
                        <iframe id="pdf-preview" class="w-full h-full min-h-[450px] bg-white" title="PDF preview"></iframe>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const fileInput = document.getElementById('excel-file');
        const dropzone = document.getElementById('dropzone');
        const fileInfo = document.getElementById('file-info');
        const filenameDisplay = document.getElementById('filename-display');
        const filesizeDisplay = document.getElementById('filesize-display');
        const fileError = document.getElementById('file-error');
        const removeFileBtn = document.getElementById('remove-file-btn');
        const convertBtn = document.getElementById('convert-btn');
        const downloadBtn = document.getElementById('download-btn');
        const stateEmpty = document.getElementById('state-empty');
        const stateLoading = document.getElementById('state-loading');
        const stateReady = document.getElementById('state-ready');
        const pdfPreview = document.getElementById('pdf-preview');
        const outputFilename = document.getElementById('output-filename');
        const outputMeta = document.getElementById('output-meta');

        let currentFile = null;
        let generatedPdfBlob = null;
        let generatedPdfName = "";

        ['dragenter', 'dragover'].forEach(n => dropzone.addEventListener(n, (e) => { e.preventDefault(); dropzone.classList.add('border-emerald-500'); }));
        ['dragleave', 'drop'].forEach(n => dropzone.addEventListener(n, (e) => { e.preventDefault(); dropzone.classList.remove('border-emerald-500'); }));
        dropzone.addEventListener('drop', (e) => { if (e.dataTransfer.files.length) handleFileSelection(e.dataTransfer.files[0]); });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFileSelection(e.target.files[0]); });

        function handleFileSelection(file) {
            currentFile = file;
            filenameDisplay.textContent = file.name;
            filesizeDisplay.textContent = (file.size / 1024).toFixed(1) + " KB";
            fileInfo.classList.remove('hidden');
            convertBtn.disabled = false;
            convertBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        removeFileBtn.addEventListener('click', () => {
            currentFile = null;
            fileInfo.classList.add('hidden');
            convertBtn.disabled = true;
            convertBtn.classList.add('opacity-50', 'cursor-not-allowed');
            stateEmpty.classList.remove('hidden');
            stateReady.classList.add('hidden');
        });

        // Triggering standard Fetch Request mapping to the Flask backend route
        convertBtn.addEventListener('click', () => {
            if (!currentFile) return;
            stateEmpty.classList.add('hidden');
            stateLoading.classList.remove('hidden');

            const formData = new FormData();
            formData.append('excelFile', currentFile);
            formData.append('orientation', document.querySelector('input[name="orientation"]:checked').value);
            formData.append('paperSize', document.getElementById('paper-size').value);
            formData.append('gridlines', document.getElementById('gridlines').checked);
            formData.append('allSheets', document.getElementById('all-sheets').checked);
            formData.append('scaling', document.getElementById('scaling').value);

            fetch('/api/convert', {
                method: 'POST',
                body: formData
            })
            .then(res => {
                if (!res.ok) throw new Error("Flask engine calculation fault.");
                return res.blob();
            })
            .then(blob => {
                generatedPdfBlob = blob;
                const base = currentFile.name.substring(0, currentFile.name.lastIndexOf('.'));
                generatedPdfName = base + '.pdf';
                pdfPreview.src = URL.createObjectURL(blob);
                outputFilename.textContent = generatedPdfName;
                outputMeta.textContent = `PDF Document · ${(blob.size / 1024).toFixed(0)} KB`;
                stateLoading.classList.add('hidden');
                stateReady.classList.remove('hidden');
            })
            .catch(err => {
                stateLoading.classList.add('hidden');
                stateEmpty.classList.remove('hidden');
                fileError.textContent = err.message;
                fileError.classList.remove('hidden');
            });
        });

        downloadBtn.addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(generatedPdfBlob);
            a.download = generatedPdfName;
            a.click();
        });
    </script>
</body>
</html>
